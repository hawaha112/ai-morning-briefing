<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 早报 · 2026年04月08日</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═════ Design Tokens ═════ */
:root {
    --bg: #0b0b12;
    --bg-card: rgba(255,255,255,0.03);
    --bg-card-hover: rgba(255,255,255,0.055);
    --text-100: #e4e4ec;
    --text-70: rgba(228,228,236,0.70);
    --text-50: rgba(228,228,236,0.50);
    --text-35: rgba(228,228,236,0.35);
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.10);
    --accent: #6b8afd;
    --green: #5a9e6f;
    --amber: #c9a227;
    --red: #c05050;
    --radius: 12px;
    --sans: 'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --serif: 'Noto Serif SC',Georgia,serif;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text-100);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

/* ═════ Header — 极简 ═════ */
.header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,11,18,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
}
.header-inner {
    max-width: 1120px; margin: 0 auto;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.h-title {
    font-family: var(--serif); font-size: 17px; font-weight: 700;
    color: var(--text-100); white-space: nowrap; letter-spacing: -0.3px;
}
.h-date { font-size: 11px; color: var(--text-35); white-space: nowrap; }
.h-stats {
    display: flex; gap: 10px; margin-left: auto;
    font-size: 10px; color: var(--text-35); letter-spacing: 0.3px;
}
.h-stats b { color: var(--accent); font-weight: 600; }
.search-wrap { position: relative; flex: 1; max-width: 260px; }
.search-wrap::before {
    content: '⌕'; position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%); font-size: 12px; color: var(--text-35);
    pointer-events: none;
}
.search-box {
    width: 100%; padding: 7px 10px 7px 28px;
    background: rgba(255,255,255,0.035); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-100); font-size: 12px; outline: none;
    transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--accent); }

/* ═════ Filter ═════ */
.filter-bar {
    max-width: 1120px; margin: 14px auto 0; padding: 0 20px;
    display: flex; gap: 5px; flex-wrap: wrap;
}
.f-btn {
    padding: 4px 12px; border: 1px solid var(--border);
    background: transparent; color: var(--text-35);
    border-radius: 14px; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.f-btn:hover { border-color: rgba(107,138,253,0.4); color: var(--text-50); }
.f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ═════ Briefing ═════ */
.briefing {
    max-width: 1120px; margin: 20px auto 0; padding: 0 20px;
}
.briefing > * {
    max-width: 680px;
}
.br-title {
    font-family: var(--serif); font-size: 14px; font-weight: 700;
    color: var(--text-50); letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 10px;
}
.br-editorial {
    font-size: 14px; line-height: 1.75; color: var(--text-70);
    margin-bottom: 14px;
    border-left: 2px solid var(--accent); padding-left: 14px;
}

/* ═════ Grid — masonry columns ═════ */
.grid {
    max-width: 1120px; margin: 18px auto; padding: 0 14px;
    columns: 3; column-gap: 10px;
}
@media (max-width:1024px) { .grid { columns: 2; } }
@media (max-width:640px)  { .grid { columns: 1; padding: 0 10px; } }

/* ═════ Card — 最小有效差异 ═════ */
.card {
    break-inside: avoid;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.25s, transform 0.25s;
    opacity: 0; transform: translateY(8px);
    animation: cardIn 0.35s ease forwards;
    background: var(--bg-card);
    -webkit-tap-highlight-color: rgba(255,255,255,0.05);
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
}
.card:hover {
    border-color: rgba(255,255,255,0.10);
    background: var(--bg-card-hover);
}
.card.hidden { display: none !important; }
@keyframes cardIn { to { opacity:1; transform:translateY(0); } }

/* card image */
.card-img {
    width: 100%; height: 140px;
    background-size: cover; background-position: center;
}
@media (max-width:640px) { .card-img { height: 120px; } }

.card-body { padding: 14px 16px; }

/* featured — subtle warm background, not a colored border */
.card--featured {
    background: rgba(107,138,253,0.03);
    border-color: rgba(107,138,253,0.12);
}

/* Z1 — bare minimum: category + time */
.z1 {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
}
.z1-left {
    font-size: 11px; color: var(--text-35); letter-spacing: 0.2px;
}
.z1-meta {
    font-size: 11px; color: var(--text-35); white-space: nowrap;
}

/* Z2 — the card IS this sentence */
.z2 {
    font-family: var(--serif);
    font-size: 15px; font-weight: 700; line-height: 1.55;
    color: var(--text-100); margin-bottom: 10px;
}

/* Z3 — natural reading flow, no decorative borders */
.z3 { margin-bottom: 10px; }
.z3-why {
    font-size: 13px; line-height: 1.6; color: var(--text-60, rgba(228,228,236,0.60));
    margin-bottom: 8px;
}
.z3-details {
    display: flex; flex-direction: column; gap: 4px;
}
.z3-detail {
    font-size: 12px; color: var(--text-50); line-height: 1.5;
    padding-left: 12px; position: relative;
}
.z3-detail::before {
    content: '·'; position: absolute; left: 2px;
    color: var(--text-35); font-weight: 700;
}

/* Z5 — source only, no button, no announcement */
.z5 {
    font-size: 10px; color: var(--text-35);
    padding-top: 8px; border-top: 1px solid var(--border);
}

/* ═════ Modal — immersive article view ═════ */
.modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    z-index: 1000; display: none;
    align-items: flex-start; justify-content: center;
    padding: 3vh 10px; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.modal-overlay.show { display: flex; }
.modal {
    background: #13131f;
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 560px; width: 100%;
    margin: auto;
    animation: mUp 0.25s ease;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    overflow: hidden;
}
@keyframes mUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
/* Hero image — full bleed at top */
.m-hero {
    position: relative; width: 100%;
    max-height: 220px; overflow: hidden;
}
.m-hero img {
    width: 100%; height: 220px; object-fit: cover; display: block;
}
.m-hero-gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(transparent, #13131f);
}
/* Close button — floating top-right */
.m-close {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    background: rgba(0,0,0,0.5); border: none;
    color: #fff; width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    transition: all 0.15s;
    -webkit-tap-highlight-color: rgba(255,255,255,0.1);
    touch-action: manipulation;
}
.m-close:hover { background: rgba(0,0,0,0.7); }
/* Body content — padded */
.m-body {
    padding: 20px 22px 22px;
}
/* Source + meta pills row */
.m-pills {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    margin-bottom: 14px; font-size: 11px; color: var(--text-35);
}
.m-pill-sep { opacity: 0.4; }
/* Source bar at top */
.m-src-bar {
    font-size: 12px; color: var(--text-50); margin-bottom: 14px;
}
/* Detailed content — the main reading area */
.m-detailed {
    font-size: 14px; line-height: 1.85; color: var(--text-80, rgba(228,228,236,0.80));
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    white-space: pre-line;
}
/* Article image gallery */
.m-gallery {
    display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    margin-bottom: 18px; padding-bottom: 8px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
}
.m-gallery::-webkit-scrollbar { height: 4px; }
.m-gallery::-webkit-scrollbar-track { background: transparent; }
.m-gallery::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.m-gallery img {
    height: 140px; min-width: 100px; border-radius: 10px;
    object-fit: cover; flex-shrink: 0;
    border: 1px solid var(--border);
    transition: transform 0.15s;
}
.m-gallery img:hover { transform: scale(1.03); }
@media (max-width:640px) { .m-gallery img { height: 120px; } }
/* Bottom close button — easy to reach with thumb */
.m-close-bottom {
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; margin: 20px auto 8px;
    background: rgba(255,255,255,0.08); border: 1px solid var(--border);
    border-radius: 50%; cursor: pointer;
    color: var(--text-50); font-size: 18px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: rgba(255,255,255,0.1);
    touch-action: manipulation;
}
.m-close-bottom:hover { background: rgba(255,255,255,0.15); color: #fff; }
/* Deep sections — background & analysis */
.m-deep {
    display: flex; flex-direction: column; gap: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
}
.m-deep-section { }
.m-deep-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-50);
    margin-bottom: 6px;
}
.m-deep-text {
    font-size: 13px; color: var(--text-60); line-height: 1.7;
}
/* Footer — source + action */
.m-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 18px; padding-top: 14px;
    border-top: 1px solid var(--border);
}
.m-action {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 9px 18px;
    background: rgba(107,138,253,0.12); color: var(--accent);
    text-decoration: none; border-radius: 10px;
    font-size: 13px; font-weight: 600; transition: background 0.15s;
    -webkit-tap-highlight-color: rgba(107,138,253,0.2);
    touch-action: manipulation;
}
.m-action:hover { background: rgba(107,138,253,0.22); }
.m-footer-src {
    font-size: 11px; color: var(--text-35);
}

/* ═════ Footer ═════ */
.footer {
    text-align: center; padding: 28px 20px;
    color: var(--text-35); font-size: 11px;
    border-top: 1px solid var(--border); margin-top: 20px;
}
.footer b { color: var(--accent); }

/* ═════ Empty & Scrollbar ═════ */
.empty { text-align: center; padding: 60px 20px; color: var(--text-50); font-size: 13px; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
<div class="header-inner">
    <div class="h-title">📡 AI 早报</div>
    <div class="h-date">2026年04月08日 周三 · 07:00</div>
    <div class="search-wrap">
        <input type="text" class="search-box" id="searchBox" placeholder="搜索…" aria-label="搜索">
    </div>
    <div class="h-stats">
        <span><b>0</b> 篇</span>
        <span><b>0</b> 源</span>
    </div>
</div>
</header>

<!-- Filters -->
<div class="filter-bar" id="filterBar"><button class="f-btn active" data-filter="all">全部</button>
</div>

<!-- Briefing -->

    <section class="briefing">
        <h2 class="br-title">今日速览</h2>
        <p class="br-editorial">今天暂无重要 AI 新闻。</p>
    </section>

<!-- Cards Grid -->
<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modalContent"></div>
</div>

<!-- Footer -->
<footer class="footer">
    AI 早报 · <b>0</b> 个信息源 · <b>0</b> 篇资讯 · 2026年04月08日
</footer>

<script>
const __data = [];
const typeLabels = {"paper":"学术论文","news":"新闻报道","official":"官方发布","opinion":"观点文章","community":"社区讨论","video":"视频"};

function openModal(idx) {
    const a = __data[idx];
    if (!a) return;

    // Hero image (full-bleed top)
    let heroHtml = '';
    if (a.image) {
        heroHtml = '<div class="m-hero"><img src="' + a.image + '" onerror="this.parentElement.style.display=&#39;none&#39;" alt=""><div class="m-hero-gradient"></div></div>';
    }

    // Source bar
    let srcBar = '<div class="m-src-bar">' + a.source_icon + ' ' + a.source_name + ' · ' + a.pub_date + ' · ' + (typeLabels[a.source_type]||'') + '</div>';

    // Detailed content — the main reading section (not repeating card info)
    // Fallback to summary when detailed_content is not available
    let detailedHtml = '';
    let detailedText = a.detailed_content || a.summary || '';
    if (detailedText) {
        detailedHtml = '<div class="m-detailed">' + detailedText + '</div>';
    }

    // Article image gallery — extra images from the article page
    let galleryHtml = '';
    if (a.extra_images && a.extra_images.length > 0) {
        // Filter out the hero image to avoid duplicate
        let imgs = a.extra_images.filter(function(u) { return u !== a.image; });
        if (imgs.length > 0) {
            let imgTags = imgs.map(function(u) {
                return '<img src="' + u + '" onerror="this.style.display=&#39;none&#39;" alt="" loading="lazy">';
            }).join('');
            galleryHtml = '<div class="m-gallery">' + imgTags + '</div>';
        }
    }

    // Deep sections (background + analysis)
    let deepHtml = '';
    if (a.background) {
        deepHtml += '<div class="m-deep-section"><div class="m-deep-label">背景脉络</div><div class="m-deep-text">' + a.background + '</div></div>';
    }
    if (a.deep_analysis) {
        deepHtml += '<div class="m-deep-section"><div class="m-deep-label">深度解读</div><div class="m-deep-text">' + a.deep_analysis + '</div></div>';
    }
    if (deepHtml) {
        deepHtml = '<div class="m-deep">' + deepHtml + '</div>';
    }

    document.getElementById('modalContent').innerHTML =
        heroHtml +
        '<button class="m-close" onclick="closeModal()">✕</button>' +
        '<div class="m-body">' +
            srcBar +
            detailedHtml +
            galleryHtml +
            deepHtml +
            '<div class="m-close-bottom" onclick="closeModal()">✕</div>' +
            '<div class="m-footer">' +
                '<span class="m-footer-src">' + a.reading_minutes + ' min read</span>' +
                '<a href="' + a.link + '" target="_blank" rel="noopener noreferrer" class="m-action" onclick="event.stopPropagation();">阅读原文 →</a>' +
            '</div>' +
        '</div>';

    document.getElementById('modalOverlay').classList.add('show');
    document.body.style.overflow = 'hidden';
    document.getElementById('modalOverlay').scrollTop = 0;
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    document.body.style.overflow = '';
}

// Card click — event delegation with scroll vs tap detection
(function() {
    var grid = document.getElementById('grid');
    if (!grid) return;
    var touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    var TAP_THRESHOLD = 10;  // px — finger movement within this = tap
    var TAP_MAX_MS = 300;    // max duration for a tap

    function openCard(card) {
        var idx = card.dataset.idx;
        if (idx !== undefined) openModal(parseInt(idx, 10));
    }

    // Desktop click — works fine, no scroll conflict
    grid.addEventListener('click', function(e) {
        // Ignore if touch device (handled by touch events below)
        if ('ontouchstart' in window) return;
        var card = e.target.closest('.card');
        if (card) openCard(card);
    });

    // Touch: record start position
    grid.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }
    }, {passive: true});

    // Touch: only open if finger barely moved (tap, not scroll)
    grid.addEventListener('touchend', function(e) {
        if (!e.changedTouches || e.changedTouches.length !== 1) return;
        var dx = e.changedTouches[0].clientX - touchStartX;
        var dy = e.changedTouches[0].clientY - touchStartY;
        var dt = Date.now() - touchStartTime;
        var dist = Math.sqrt(dx * dx + dy * dy);
        // Only count as tap if finger moved less than threshold and was quick
        if (dist < TAP_THRESHOLD && dt < TAP_MAX_MS) {
            var card = e.target.closest('.card');
            if (card) {
                e.preventDefault();
                openCard(card);
            }
        }
    }, {passive: false});
})();

// Filters
document.querySelectorAll('.f-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        document.querySelectorAll('.card').forEach(c => {
            c.classList.toggle('hidden', f !== 'all' && !(c.dataset.cat && c.dataset.cat.includes(f)));
        });
    });
});

// Search
document.getElementById('searchBox').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('hidden', q && !c.textContent.toLowerCase().includes(q));
    });
});

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('searchBox').focus();
    }
});
</script>
</body>
</html>
